front:
  text: 啓真集卷上上
  hash: sha256:9ca5d7c399037e0744f6ec169aa9292337a444fdb5a6544186dd610e84b8246c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0249_HFL_001-001a, image: hfl/0117/0117-094.png}
body:
  text: 金峰山通玄子劉志淵撰七言絶句答王安仁問日用綿綿不聞息風扇玉路衝開透骨炎崑頂白烹成玉液功高九九合抽添繼王用彰詠酒休假漿醅麴糵香自家金醴味偏長無心爛飲終朝醉酩酊神遊不夜鄉和漆子明韻抖擻塵襟樂道場拍懷風月舊家鄉一壺春色清明界物我翛然總兩忘繼范清叔韻林泉深處隱仙家時復偷間耨月華為愛銀河風浪淨飄颻霞羽泛靈槎東溪趙大師獻茶有作玉甌神水點靈砂妙手烹成瑞雪花昔日盧同曾得味我今全明是黃芽擒昌陋庵不趨朝市不趨山只愛貧居盡日間夜月曉風為契友紆青拖紫不相攀又幽居志樂不求安獨對煙嵐碧落間旋立旋行沉俗慮半歌半舞幾開顔付李先生耳邊得句要功程舌上難求大器成火候按時成七七都融骨肉鬼神驚和鑑軒韻幽軒鑒晃奪蟾宫照破中間萬事空應現頭頭無物纍光明內外體圓融又韻虛室幽軒清淨鑑從來不許世人磨光含萬象能常應應物無私不滯他詠筆骨健身輕首似針隨人染翰性難禁枝生幹死經千古猶自淋灕使黑心永真庵夕照軒平林日掛暮天晴光射雲軒潑眼明晃我已歸金色界更無半米俗塵縈谷神庵竹雲庭妙手植修筠徑節虛心不染塵傲雪欺寒神彩異青青長占四時春出家不悟割愛剛求出世方翻成晝夜一身忙只誇頃畝能耘耨一寸芝田却盡荒述懷釀就逡巡不死漿陶陶飲醉入仙鄉醒來似沐無生體頓覺金波滿腹香中秋賞月十分蟾影奪冰寒晃徹金天法界寬已見圓明真實相不須更舉指頭看憩松軒芒鞋竹杖憩茅廬坐對松軒若太虛風靜煙寒天萬里冥然疑在舊華胥松軒聞琴松軒特地解塵襟三弄瑶琴一炷沉鳴雜篩風聲瑟瑟不須煙島聽仙音繼才卿韻天中復有一重天箇裏恢張造化權體混太虛無作相十方觸處現孤圓警衆道包兩地與三天莫執無心合自然運用應期乾體就恁時方顯性珠圓性月纖雲不放翳霜天性月當空極皎然三界十方能應現千潭普照一時圓晉水晋派清泠不畏寒溫溫如沸噴雲煙灼知獨顯長春氣不受陰陽造化權太陵庵孤庵幽閒倚雲山門絶輪蹄多蘚斑讀罷黃庭煙篆冷相陪猿鹿樂安間登大樓梯上危樓眼界寬一天萬里掌中看清清迥絶纖塵翳似覺間身寄廣寒觀梅凛冽寒威萬彙摧嘉園獨壯舊瓊梅素英不畏嚴風力雪裏枝頭取次開同羊任老見邀身如不繫一漁舟寰海隨流信意遊興則歌吟困則卧閻浮一任换春秋偶作絶相巖前樞妙用無生境上養天真匠成一點玲瓏體散即為風聚即神任二先問日用抽添鉛汞按時烹毫髮參差藥不成若解日增珠一粒光含空界體圓明和武殿試贈王先生山庵蟄迹淨無塵耕道真功日日新一片間心俱不染惺惺堪繼棄瓢人驟雨雲起天門如潑墨雷鳴電掣雨如傾峥嶸勢猛隨風散一洗江山萬里清山居固窮活計居深壑猿鹿知音外絶鄰檀乳一罏無箇事衡門三徑拍懷春訪隱者不遇煙霞深處訪仙人爭奈尋真不遇真鶴駕飄飄無覓處落花空鎖武陵春雲溪庵西軒晚來陽焰射西軒照見頭頭物物全一段光明輝道眼不須别覓自家天和韓子玉遊東山騰騰蠟屐陟東岡頓覺身心一味凉歎此體剛常自淨解磨歲月地天長和步才卿金峰觀金峰仙館對孤嶺人自深銘道德心感得慶雲時復現蓬宫眼底不難尋又壯麗金峰壓遠岑庭前古柏冒天心分明指出西來意何必曹溪遠遠尋又觀榜金峰接翠岑冰清氣象貫人心勞勞多少利名客誰肯偷間到此尋贈趙大師蟄居勝地清溪口短塌薄團鎮不眠欲鍊玄宫丹一粒須憑藥鼎火三千馮仲祥問修行不宜泥象執文求不可傍蹊曲徑搜要識虛無神氣谷無中取有是真修又灰心枯坐徒勞體瞎鍊盲修謾役神須識藥材元出處復明火候養成真復問天光有作無為俱不是守持存想總成非鉛罏汞鼎機真造精結神凝內發輝又龍爭魂兮肺爭魄烏戰元精兔戰神空土無為和合了合光默默契天真吕和之問修行下手修行要死陰陰莖不死萬緣侵未知箇裏真消息牢捉牢擒走不禁問金丹金丹取有自無中莫為無中只著空空是真空空了當了空空體體圓融又問丹法定是水精慧是火心為真汞身為鉛功夫片餉能凝結十月成胎作上仙喬大師索孤魂幡讚黃雲招颭杖頭挑引領幽魂上碧霄一自玉音人演罷冥關業散逐風飄皮院楊公索頌巧把頑皮利削開不教向上翳塵埃匠成真淨冰霜體未與腥羶一例裁王庵主送别索頌來時九夏榴噴火去後三秋菊傲霜一片間心煙水外大家默默守真常元夜鼇山燈火爇金蓮九陌樓臺鬧管絃眼底珠璣千點亂粧成不夜一壺天問啄木一種靈禽啄木中爪剛觜利急施功非干不足求充腹解與喬林去蠧蟲警學琴學道忙忙惜寸陰絲桐調弄謾勞心自家備有無絃曲何必剛求指上音警圍碁手談一著役間情覿面生機黑白爭黑白若知無二色死生路上不須驚劉先問毫髮差殊不作丹十月總分三萬刻住行坐卧要綿綿功夫一刻一年候數奪天中三萬年又三奇刻刻用無他三萬刻中要調和一刻差違藥材耗金丹欲結更憑何許先問修鍊法度水火調勾無燥濫汞鉛烹鍊入丹臺隨時隨日漸凝聚無質無形結聖胎又問玄霜採來日月二輪氣奪得乾坤一點陽按候運歸鉛汞鼎水烹火鍊結玄霜李道寬問修行身藏真氣心藏精二物烹煎得性靈若下十分三考志百千萬劫顯惺惺問伏鉛汞汞鉛見火能飛走須以無名朴鎮守鉛入坤宫汞入乾調勾水火丹無咎左老問到頭著忘形養氣氣為根忘氣養神神養真神亦復忘虛即養養虛合道到頭人提初在道著空道不遠人人遠道人能體道道尋人須知心得無空用空自不空空是真又營營遠離諸疑網念念能開衆妙門識破妄緣無執相皎然心鏡不曾昏又六塵緣影非心相斷滅明空亦外尋欲識無空真法體先須明了一真心李妙真問虛空一體覺前覺後兩非真當體消亡體遍融寂爾無思心正住豁然如託大虛空警衆說夢夢中夢是兩重虛影外影為三等妄展轉隨緣虛妄生緣心總把真心障又一切有為如夢幻幾多緣念是怨魔緣生本體非真實當體不亡奈爾何又夢為空相身為夢念念爭空夢亦同夢想一生同一我是無我我不空空問超造化紛紛造化渾超出浩浩卓然惟獨立靈照嚴持力不忘一真安住無差失問日月高奔日月高奔妙用機金烏血採過泓池直須穩宿蟾宫桂漸漸烹成白雪肌續妙淨問止念念起直須覺疾止休教念起覺心遲若能覺速止能速妙道現前立可期雪中半嶺羊腸路曲盤林巒雪障逼人寒憑欄極目乘高望頓覺一壺天地寬西溪間居門外溪聲潄玉寒貫人心地坦然安華胥夢覺無餘事一碗松茶一炷檀七言律詩永真草亭道院幽人構草亭土階蓬牖明經營留連好月添間興勾引清風快野情瑞靄密藏三徑淨晴嵐低浸一簾明有時猿鶴來相訪似話高堂未必清贈西山隱者幽人習性厭蝸名痼疾煙霞快野情橡實胡麻甘度日藥爐經卷樂為生曉觀山市晴嵐色夜聽松猿叫月聲萬事到頭都不會一真法界獨峥嶸示衆一性清虛六氣和風波不動沒禪河生涯貪積黃芽廣活計慳藏白雪多清淨場中甘展轉光明境上獨張羅而今著屬虛空體一片功夫是了呵又味道綿綿用不勞廓開玄量絶塵囂二輪光射九天朗三島風回四海潮六妄生情俱瓦解四隨報法總冰消心空不著如空界一性玲瓏萬古超啓真集卷上
