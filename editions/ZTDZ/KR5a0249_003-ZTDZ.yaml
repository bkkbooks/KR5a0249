  text: 啓眞集卷下夜十三
  hash: sha256:1cd0d4ed4cb7dba3437adae2b52b26040feb8038c3f54198b3e7da3ed9280cde
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0249_SJB_003-040477b, image: sjb/04/040477b.png}
body:
  text: 金峰山通玄子劉志淵撰寡心章第一紫陽眞人謂眞心者左爲性之宗日之䰟右爲命之祖月之𩲸中有谷神所居一身之帝室寔還丹樞要入道根宗純陽謂飲海龜是也廼修眞必用之所儻此外鍊眞則无鼎无歸如造食无器雖用力多而功效寡此心非六塵縁影非肉團大心雖无形而扣之即應廼神氣之所心外之眞心識此心者爲見性也紫陽謂大心必敗小心必勝者知其然荀能身反在心三昧正受隨日隨時神意乆守而不動性鍊則靈靈凝健體千變萬化如鑑能應能靜燭物无方復无一物留滯當坐卧住行語默動靜間安若泰華淨如虚空寬綽綽圓陀陀無物可觸無幽不明是了出而得眞心之用不識此心見此性者是謂盲修瞎鍊枯坐灰心至皓首而難成矧學而不遇遇而不行行而不勤者哉彼有固必妄言不出户庭而得妙道者何謬之甚耶天中天章第二河上公謂玄之又玄者明天中復有天也非神氣混合殢昏而定見日月參羅萬象風雨雷電峥嶸之天此境爲不能制伏神氣隨縁妄想而現廼兩重之幻境也惟此一天者上有生門下有死户廼身内玄牝一所非心腎穀道也非膀胱丹田也是日月相合之宫陰陽齊會之所囊彼虚無根乎神氣亦無蹊徑亦無邊傍其小無内其大無外近括方寸遠包八荒九轉功於此則藥就三性並於此則丹凝厥有白雪黄芽華池神水結胎脱體俱在此矣仍會九宫八卦攢四象五行聚結汞鉛斡旋支干亦在此矣眞謂玄造長春不夜之天號神通大光明藏虚無至清淨方此天受用咫尺成眞如觀諸掌而易得然則被重陰乆蔽幪覆彌深不可作聰揣度而開之不可執文泥象而關之須心法動作道力堅壯克荷付囑之重者廓眞智而得之昔丹陽眞人云執持三要淨靈臺霧鎖煙籠竟不開再遇重陽師指教清風吹出月明來以是知必心傳而可大受不可小知也設或不耳得丹凝胎結成長生之體具六通神力者未之有也眞土章第三昔平叔詩云虎躍龍蟠風浪麤中央田地產玄珠又云離坎若還無戊己雖合四象不成丹只因彼此懷眞土遂使金砂有返還蓋明土爲五行之中三火之主統八方根九氣號眞空空土也廼種藥大釜產寳元宫收無影之光納八水之液清淨覺地長明不夜之鄉上綜日月鼎下攝龍虎罏盜鍊乾坤之炁生成離坎之晶此宫受法無不達於天仙豈不見百端復注謂鈆汞下種地中朝種暮收然此地種之淺則子浮而不生深則反潰而不長况不得其土者乎如根荄芽甲得土而生失土而死是萬古必然之理灼知長黄芽生玉蘂栽培眞造全籍于是兼土者廼眞神意也聚三元功七返不得陽神之機不能成造化若神到於此則氣應氣到於此則神靈神靈則形顯乃出現無方隨機應靜表土之神用大矣哉昔長春眞人謂寸心直下如能體便得終身上大羅是明眞土之用設學者捨此而修何異迷人失路而求家沿石而求生穀者哉心息相依章第四學得了悟之見决定之志解縛釋累懲忿窒慾以心息相依最爲要切蓋息爲攝生之法廼綿綿而醖釀元氣勿令元氣佐喜怒而離散常若存而温養元宫漸凝質而變成丹寳所謂心住則息住息行則心行以心爲攝念之法常澄澄而保護靈源妙覺勿以妙覺隨妄縁而興動顯廣大靈通精爽不昧若能並用心息二法何勝如之諒闕一不可豈不聞悟眞常不達命此是修行第一病達命基迷祖性恰似鑑容無寳鏡必也身無事而氣不散心無爲而神不擾則可矣然而滌慮調心養息續命此相依之法失其中正則成有爲之邪見復無一法可得無一相可親此寂滅之用失其中正則落頑空之邪宗蓋用之不可執捨之不可捐在用捨中間要明得普眼開得正智似體非體將作止任滅四法不罹執病行住坐卧四威儀不隨妄念既無遍計執清如空中之風無依無止不染不着其心自空洞照一眞豁然無礙此二妙之㫖萬古必用之法一乗階聖之基矣死陰生陽章第五三聖玉訣所謂世人不解死陰夫陽者生之本陰生者死陽之根但吸靈龜而死陰莖其神自生莫爲死陰莖而死道嗚呼彼之修身者只知禁慾殊不知一念心動氣隨心散精逐氣亡豈不聞長春眞人曰一念色心動百骸和氣傷惟得法者陰莖一死而如無六慾七情當體消滅三尸九蟲沓絶無蹤其萬慮擎然頓息故得正念實相對景無心似白玉投泥而不染安若泰山而不動自三關閉而無遺生門鑰而大啓九光氣變五金霞生顯雙頭玉鹿高吐金風三寸赤龍低取木液藥罏煎汞壺鼎凝霜體變純陽形神俱妙跳出天地之外釋縳陰陽之中足表此機爲修身之急務彼哉或言陰不死而頓無慾者蓋有之矣吾未之見也氣神邪章第六學人氣得混沌之後氣无所歸充溢浮行令體多觸動狀似猖狂凡所動者各八十一數以爲别有奪舍者非也此氣邪不撥復成神邪灼見神鬼現前知休知咎知果知因以爲神通靈明者亦非也此神邪不撥復成魔境因内邪感外邪異事萬端斯人也而有斯疾乃禍胎鬼趣喪命失身之本徒爲相是而心非何異羊質虎皮持蒯厠蘭者哉凡我在道君子何不辨之早辨耶荀得機而神氣適正以法度鍊之則魂魄凝和以斤兩鍊之則神精結聚漸凝漸變靈肌顯相結成聖胎金光滿室繚繞而籠罩眞形變作純陽神生眞宅飛出崑頂現我而明光明遍照内外輝輝一混太虚而無異體此廼眞境界也可爲性命一了周徧含融而不昧如是則必得耳邊言誘方能腦後眼明寔萬古玄門之通論矣證明道用章第七或者問曰昔聞謂少年修根脚壯老後鈆虧汞少如何向假使父母未生之前烏有精血氣液既没之後復歸地水火風於斯二際有似無處不有也奚分彼我豈有形容何以假修而爲心愈狐疑而未判對曰善哉問吾語汝昔陳泥丸答玉蟾云道本無形喻以爲龍虎道本無名比以爲鈆汞假乾坤爲鼎器坎離爲藥物以七返九還之功鍊作純陽長生之體蓋非執有形有爲而得之常默默然在恍惚沓冥之際安有彼我形容哉其體日照無影神用自在性合萬德用絶百非然則本眞亦不即亦不離動則凝清適用而入玄冥靜則融神無像以出空寂在動靜間表裏光光相射一身如水晶塔耀地輝天遍照不昧一性如盤中珠圓明活健瑩淨無疵如是則顯本來妙體動變無凝名相不有與道合眞方證來時物去後亦空此一段大事因縁寔天僊之道或者諾乃奉辭而退疊用五教章第八大道無形無質至虚至寂聽之不聞視之不見摶之不得然而體雖無象修之有序必也悟愚而得始達始而得終得終而歸頓了頓而入圓以是知始則從本降迹自無入有次則攝跡歸本從有入無終則本跡兩忘有無雙遣勘破諸相是妄而後道合自然而然頭頭上顯物物上明遍界遍空家珍總是蓋非泥象搜玄尋文作解而得之此一段光明自心法了而不滯澄湛無爲上得來儻不功始終而鞭心入理便言下承當悟會無修直指本來無一物清淨如虚空者是舌了而心實未了枯坐而没齒無成豈不聞謂頓悟一心必假圓修萬行刹那悟道須憑長劫鍊磨噫修身君子何不三復斯言歟若聽之不深知之不明知之不明不能盡其精不能盡其精則行之無成豈虚言哉忘形養氣章第九夫人者三才鍾秀四大成形執我而有痛有痒欲富欲榮居則求安食則求飽日常保愛羈縻反墮育元養素灼見其氣須忘形而可養昔長春眞人謂終須捨身𢬵命更惜頭護面幾時休豈非忘形之用又云心如山不動氣似海常潮豈非養氣之機丹陽眞人謂體虚則氣運議不誣矣抑又聞陰符訣曰凡修身之子死其心抱其一貪其氣運其精灼知身中之氣不可散學者當黜聰隳體形爲槁木天門大啓地户牢扃正念現前萬慮悉泯呼吸綿綿若存若亡收拾冲和開龍虎之穴相接太乙元宫眞氣使晝夜陰陽昇降不已水火抽添加减無差以致鈆鼎温温而不斷培眞火不越三關百端謂温温不斷身處上蒼者豈虚語哉蓋氣海淨而邪不千常如鷄抱卵似鹿養茸永護一氣以歸根證得保命長生之道昔跨鯉入水跨鯉出水者豈非忘形而得之耶忘氣養神章第十謂人之修進者理得中正火不有燥水不有濫二者依度而調勾一氣伏鑪而不走成金液還返以凝眞何可固執而不忘設或不忘則猶川既濟而舟不捨難超彼岸病既愈而藥服不止反傷正氣平叔謂用鈆不得用凡鈆用了眞鈆也棄捐此是用鈆眞妙訣用鈆不用是誠言以是知功切養神則須澄湛而忘其氣既心不生用則理不死神其不死之神非心意念慮之神廼與天地同根萬物同體以機養之而似體如無使日月相照内發天光狀若珠明象同月體照耀内視晝夜分明變成神通寳藏如是則神薦神而神靈如鶴馭風而不測出入莫認此以爲神奇當復按養虚谷中如山鎮而不動倏爾一日化生有身放去收來而由己可謂養神之道足矣豈不聞張眞人解佩令云陽神離體冥冥沓沓刹那間遊徧三島出入純熟按捺住别尋玄妙合眞空太虚是了誠哉是言也忘神養虚章第十一夫得法鍊神者神守玄宫而純粹未能融空而變遷必也忘此神而養其虚由是不住無爲不盡有爲前不接已滅之滅後不起未動之動於斯斷續之際寂爾無思心正住之時勘破萬法皆空諸相非實一一妄縁當體消亡諸漏自盡亦無所住之住又無所念之念冥然而似用不用泊然而以虚融虚其虚無之體豁爾無凝設不達始終引養之變者或養之於上反炙其眼目紅暈其臉失鍊赤心或養之於下者汨没丹田徒活計於穀道或養之於外者迷頭認影耗散金沙或養之於内者修飾腹心神妙束而不普於是各執其一而遞成虚妄横計競是此是彼是得是失而不能自出未足與議也惟莫上要妙一着在了養氣神而得内視内覺身心空外覺萬物空凡事見聞覺知當體不顧得至清淨而大明了廼覿面認得當處安心而純熟漸融太虚表自己一天内抱日月之明外混虚空之界不假預置心於太虚而自得與太虚一體更無秋毫許障礙亦無微塵許染着其内外上下不分作相但凝然靜定寂然不動功夫純粹打成一片此際天也非天地也非地亦不知己之所在聚則成形散即爲氣惺惺灑灑卓然獨立可謂打破虚空爲了當然則言不盡意意不盡言夐出言意之表教外别傳並不在筆陣之下融攝不滯章第十二蓋聞惟目不自見故能見物鏡不自照故能照物如使自見自照自爲而不暇何及於物哉顯視照之巧别有所視照之處故得物上反過光明皎然無不是處即塵了地即滴竟海證事理不二動靜如一由是内心不起知外境本空任運乗縁勿留分别而刺鯁於胸中如金百鍊礦盡光生以證道力精研洗心玄覽外塵頓捨照見諸相體空妄縁不起圓明實相上豁然無一物更無苦藴而留礙盡攝諸境同歸一心既會相於性以還源復從本心以現眞境標微妙無相之有立法應變馳定慧之力示現種種方便成殖萬行之正智顯清淨眞性有如虚空空空無相何雲物而能礙所以玄量入微塵不足以爲小包太虚不足以爲大惟此心此境秘密圓融混成一體總了出而絶迹可謂盡法界要妙之眞空也設不立功心境蒙翳色空未能雙泯妄言融攝萬有而心不滯者何昧之甚耶無修無證章第十三粤有小乗執空而着斷滅者爲性無所歸法無所正恐色爲礙以滅色明空以離色明空但見諸相是妄無一物可親殊不見空中造物妙有之空雖不爲不宰而空中混成神妙豈如空花陽焰似有而非實彼有便言下悟會無修不曉無修之修不求之求何異凡愚元不修元不求若芻豢蠧然而但不動念有爲作曾是以爲空乎諒不入巨海不得如意珠若元不修智慧方便之行者不得裝嚴法身元不求本眞明了之體者不得圓成法性既得一時妄念頓息顯本眞體明更别無眞理可求是無所求之求也法身既具應變隨機更别無眞體可修是無所修之修也由是亦無妄亦無眞有何修有何證表靈覺本來無一物勞生有何戀常形安若泰山而不動心淨如虚室而無礙以顯妙體圓明離諸名相照見一一皆空豈有修證耶行狀通玄子劉志淵西慈高樓里人也乃超然子入室弟子從師以來二十年間不見形容喜怒而後風動晋并草偃士庶願以師事之者不勝其數先生平昔卧不驚夢行不顧途坐如槁木住若頑石常默默而心不與物構或有客相訪話不終席但若昏而口不應問視不對目果别得有所趨向之妙若非道力乆銘於胸中曷至於是耶凡所咳唾句麗隨珠趙璧得筆力如椽不假搜索而成一集目曰啓眞時享年五十有九以意終歲七月十九日尸解遺頌曰行屍地上逐風塵養就如如證本眞掬地包天無狀貌十方三界露全身及其殯也風雨送三十餘里然而近靈柩也風不動幡雨不霑衣瑞氣接霓異香噴麝凡送葬者莫不駭然萬口一辭而興歎曰此眞道業之所感也是誠偉歟董用冲古調龍乎龍歸海宫鳳兮鳳丹霄奮嗚呼通玄眞丈夫便便腹實飫膏腴學道至道有矣夫修眞得眞有矣夫張國寳六言養成紺髮靈肌脱下僊骸婥約縱横觸處堂堂了了無生妙著屈産弓用繼遺頌韻靈眞蜕殻離凡塵慧合圓明道合眞有相位中尋不得無形境上露全身西山石志王蟬蜕吾師伯無人不手額一聲震地雷萬古遺仙迹坦蕩傲風清道遥馭月白人間紀偉名天外棲眞客又七言絶句師言耳順倏遺骸升入無形不往來仙舉已應爭上甲蓬山高震一聲雷又僊丈功圓脱世籠乗風縹緲去無蹤壼山依舊人安在一片波光浸碧峰啓眞集卷下
