body:
  text: 金峰山通玄子啓眞集序夜十一竊以欲正春夏秋冬者必得指而可知欲達微妙玄通者必藉言而可悟奈言語者心識之影文字者言語之影意爲心影言爲心響終無眞體而理可窮及徼妙雙泯絶盡百非無一法可親者曷用乎言蓋理非言銘則若魚無筌而魚莫之求兔非蹄而兔無以得大抵言者魚兔之筌蹄足以紀綱至道匡轄仙機詎可忘之是以聖人作而述陰符道德發揮妙本之精賢者擬聖作書制沖虚南華之經務啓迪後覺入聖超凡何不假言而爲况近朝五眞派别教闡多方丘劉著磻溪仙樂之集譚馬目金玉水雲之號靡不鼓唱玄風焕明智鑑如霜天皓月普現千潭使彼味道者咀嚼膏腴識趨向而不陷迷津豈不以因言而明理哉而後攀龍鱗附鳳翼詮道垂訓拯溺指迷者予於通玄師見之矣師姓劉氏諱志淵西慈高樓里人生而慈慜幼慕宗風大乗契典莫不精研長值道運勃興群教釋鄙遇超然子授以頤眞養素見性識心無爲之㫖於是捨衆人之所愛收衆人之所棄慨然而逕詣重玄入衆妙之門一啖而三觀虚淨再味而八面玲瓏屢現化身一途生死其天機妙道已印於胸中凡謦咳文詞形容翰墨可謂駢珠驪玉非雕蟲篆刻而成飄飄然出旁羅搜索之表眞學者之指南寔大筆手爲之雖一詞一詠隻字片言志在抉盲剔聵俾有所受用非特獨善其身而爲之斯文未振一旦遺世六探信通迸破泥丸無形昇入厥有著述寂寥無聞門人平水李志全恐綿遠湮滅歷訪晋并得諸友口誦者一二洎劉志堅録帙者十得之八九矣乃掇遺而鳩集一編整比義類列成三帙目曰啓眞袖示於僕求校而再囑爲序引庶幾刊行以廣其傳再四披玩灼然文理碁布妙趣星分可以挈行昏衢者入大光明清淨鄉非心珠朗徹出天地之外者曷至於是耶僕雖預道胤造道髣髴慊才輕蟬翼辭短蛙鳴安敢擊布鼓於雷門執辭不獲已姑以俚語道先生才藻軌範之萬一耳時太歲甲辰仲吕下旬有二日紀之卷首同羊盡忠里鳳原老人董師言題
