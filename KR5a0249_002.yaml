body:
  text: 金峰山通玄子劉志淵撰詞滿庭芳一片間心孤雲蓬跡飄然不掛諸緣九天池裏滚滚湧靈泉澆溉黃芽瑞草吐清淨光罩金蓮真消息清風匝地透骨自綿綿混融成實相顯昂昂獨立笑傲禪天任陰陽運變劫力難煎亘古常存不壞拉真一法界安然無生滅淨明妙體萬里一禪娟其二贈侯伯通善算法天賦多能縱橫業擅策量天地高低數明日月加减辨盈虧山嶽明分廣闊料江海深淺皆知方隅內支分人物一一見毫釐廓開方寸徑求一真趣九九為規定身田精變上下推移共積三千數足商除到八百功齊一乘妙拈下實際總無遺其三警墮道者謾整巾袍妄名清淨放縱劣馬顛猿利名叢裏徒衒有因緣逐浪隨波日日不曾暫澄湛靈源堪嗟訝間模間樣辜負慕玄玄爾心還自忖怕空遷日月鬢雪垂肩好檢清攝念慧種心田認取元初靈覺常耕道獵德綿綿功三考形神俱妙灑灑證飛仙水調歌頭人道無生趣日就月相和高奔用顯烏飛離外宿靈柯秀孕蘂珠嘉瑞光射銀蟾皎潔顯現月中娥相會瑶池宴時復醉金波兩同宫七返火九成金長生體就一真安住傲無何聚散冥冥誰約出入惺惺由我玄妙苦無多大都方寸用法界總包羅大江東去人生最貴禀五行真氣千靈夙賦首足方圓天地肖反被陰陽陶鑄秋月春花昨朝今日斷送紅顏去前程路險到時手足無措算來除却一身輕肥青紫總是間家具好把中間心裂碎靜裏調和龍虎孕出靈珍天光內發變作明珠庫外融空界卓然獨縱霞步其二荆山美玉匠一合成器乾坤體辨兩竅明開分日月八卦九宫齊展方寸心存斡旋真要乙木金相戀幽人得趣便將乾象推轉微微騰倒元精只憑眼下暗裏興雷電萬匝千回循舊路迤邐亂飛銀線馥郁香塵味能實腹淨體今相見光飛如雪這回識得頭面其三初功混沌在機緘斡變坎中一氣潜發氤氲初出地升變陳雲呈瑞電掣雷轟陰陽交會致作簾纖雨帝川飛過化成玉鼎神水溶溶九變生金鍊歸離內點化成陽體神變離形攄妙用獨擅幕天席地兀兀騰騰隨方應現坦坦無拘繫含融一體頓然超出生死其四天元教顯正金蓮朵朵開遍時節士庶官僚咸仰奉緣覺聲聞心說悟者清凉背之熱惱多口明真訣諸人著眼照開千古心月了知諸相皆空不生妄想當體能消滅境界真實無染著種種抑絶分别萬境一心現前孤覺寂寂圓明徹淨無可觸太虛一體無别水龍吟宦途馳驟心貪職官事何時能畢力饒射日名高為復到今何濟休道功名遂好身退緊尋歸計啖古人糟粕放懷湖上泛扁舟樂真味穎悟安間雲水恣道遙坦然無纍豁天寬胸臆調神養氣無縈無繫性命俱相契露實相混融三際看自强手段斬釘截鐵把塵緣棄其二贈李元法綿綿一氣衝關節薰蒸遍流百脉聚歸乾鼎象成龍虎性情感結精變高超越功七返九還無闕鍊成大藥通神顯用覺香味遍身泄焕吐丹光皎潔晃靈臺一點如雪常清常淨無餘無缺圓明瑩徹顯出真心月射宇宙了無塵屑聳太虛法相無生神妙鎮千萬劫其三贈楊道寬名高三昧丹青匠貌出玄元古樣明金繪素堂堂殊勝本來真狀寶殿嚴供養攝諸方群魔膽喪露說經消息真風鬱鬱感人人總歸向外肅威儀瞻仰內須明物離心上些兒妙用無為無作無中有相應變機無障納十方廓開玄量契太空一點虛無活計壯神通藏其四間人間樂琴書味行胡郎反貨藥囊符水頓然識破沽名作解蹉跎真計枯木巖前纍要撧劣諸緣總棄剔開性月時時不昧忘神氣養虛體鍊就不空真智向太虛神妙成器淨明體態縱橫恢廓一塵無翳圓覺融三際具粧嚴法身純粹顯如如了了真常安住徹無生理聲聲慢衡門養浩匱玉藏輝營營守拙忘機手握乾坤身生萬化維持氣滚三田日日斡一渠流轉時時百骸理顯瓊漿止渴玉液充飢浴出元神妙體契圓成了了動靜熙熙不沒不生虛界體段無疵卓爾惺惺獨立傲空空實際無為樂真趣顯德風遠扇道紀高提其二玄關擊柝抱一無離知白守黑藏機火運清風三關過海輕吹化液下成四象作真汞低浸華池功九轉證黃金體就神室輝輝顯現圓明正相混人間天上萬變神奇不有不空不受垢染成疵獨擅念虛寂照料本無一物羈縻真空用顯輪回穎脫智劍高提其三贈王彥寶癭除人我冰冷高低唤惺今是昨非檢教靈質枉受萬劫沉迷况遇真風大闡要諸仙選院名題顯一志敢埿拋骨肉屣棄輕肥覓箇煙霞妙趣息諸緣妄想落魄無為保謢一真洞照力盡嚴持安泊元空妙體顯靈光出入相隨前途了决平登覺岸穩步仙梯上丹霄正陽生歸癸地氣沉沉産陰陽偃月中心化形龍虎應時交媾不須擒共成三體長黃芽香滿乾鬻音尋鼎也性如珠心如月懷如玉體如金顯九陽絶盡纖陰本來實相應機隱顯鬼神欽太虛同量瑩無塵跨古騰今一枝花玉壺金世界日月同光彩仙童為活計戀風采覓藥川源日日西南採收拾歸碧海始結金晶九變還元不壞薰透遍身香霧靄湧出光明大長生純體現傲物外可去聲界惺惺動靜都無昧一體含融量括古包今聚散無罣無礙一剪梅與張三老善友春去秋來染鬢斑日將月就斷送朱顏鉛虧汞少海源乾亢盡瓊酥枯損金蘭好養三元閉五關高奔日月光射鼇山結成圓寶雪霜寒眼底如如物外間間行香子李會首問道大道無形强立其名判五氣融攝生成貫通六合總括群靈本無情亦無臭又無聲人悟勤行造化無生要灰心沓杳冥冥不空不有妙體縱橫這真常騰今古獨惺惺其二妙道勤求樂以忘憂要蝸名蠅利心休六空罷對一氣專柔火無虧水無缺契添抽百脉通流四海周遊漸丹凝清淨光浮虛無妙體難礙難留應無方明物物顯頭頭其三問修行門户道體平平瞽者難行覓邊徼執法功精貪遊異路昧却前程啓諸人高著眼認無生湛湛澄澄醖釀惺惺啓天門地户牢扃陽升邃路高越神京過層樓歸空土結丹成其四妄認苦藴汨礙胸中逐緣生分别匆匆好將萬境同攝心宫泯迷蹤知諸相體皆空照見空宗有用真空顯心法動作明空崑崙頂上躍弄虛空這空空無可觸遍含融江神子令金藏木性木藏金體難尋火生鬻二物烹煎庚甲定浮沉返本還元真體現魂魄聚淨無陰九陽消息自來臨耳鳴琴運清音唤出靈靈越古與超今遍界遍空無不是顯了了這真心其二西山隱者相訪有緣相遇芥投針話真心死三陰陽自漿成瓊液不時斟伴飲琅琅聲貫耳無絃曲肖風琴氤氲消息拍胸襟九成金鬼神欽一混天光變化體難尋空似空中成妙有心朗朗慮沉沉其三一江九曲虎龍奔意雄雄氣融融匝轉崑崙霹靂震乾坤噴出金沙光的爍明明相混虛空法身縹眇性恢弘變無窮體無蹤常應常靜法界顯圓通境攝一心空色混無分别契真風其四曩甘聰黜體還隳索玄機守謙卑地久天長迤邐志遲疑法弱馬顛亡羈勒風花陳恣奔馳縱橫熟境意熙熙慕臺池騁輕肥蕩散冲和仙路隔雲泥再展維持天地手摶真造長靈儀其五賞菊山寒木葉暈輕黃氣封商露凝霜萬物歸根逆氣送荒凉唯有東籬黃菊綻噴冰艷吐清香分明圓相顯重陽生中央放金光全露如如神妙貌洋洋覿面一時渾認得心月照覺相忘其六與小李先待詔人清膠漆道清乖昧靈臺翳塵埃不懼如山販骨走輪回見在寶軀今不悟千萬劫朽仙材好收鉛住武都階藥苗栽結神胎九轉功成方寸蘂珠開體混淨光從隱顯隨眼底是蓬萊江梅引贈李元法不驚榮辱總無憂度春秋得優游打破𤳗𤳗無物掛心頭天內一天為活計調龍虎恣盤旋鬥未休紫金霜結有來由晃三周玉童收法界清天風月獨相酬神妙器成堪中選向仙院奪仙標第一籌其二贈劉會首粒食衣繭苦貪求鎖眉頭利名搜酷戀埏埴為器弄風流謾到寶山甘空手只坐守這輪回未肯休不如返照一身修馬猿收汞鉛留火爇丹罏按候謹添抽鍊就一真圓明寶射宇宙瑩無疵價莫酬木蘭花令兩絃中藏真造陰陽返復坎離顛倒二氣驅馳入爐竈烹煎按候藥林不耗異香馥郁風飄渺金花吹綻結成圓寶淨明實相非草草虛空一樣大光融照踏莎行寂淡忘機恬然養拙些兒妙處人難别冥冥沓沓滌神珠昏昏默默開心月萬劫雲收一天朗徹清明淨體如冰雪不增不减顯圓成惺惺灑灑無生滅其二動靜忘機聰明不作悟來總把塵情削心燈挑剔不曾昏慧光遍照彌寥廓常淨常清不耽不著一真境上從盤礴亦無牛像亦無人卓然獨立攄真樂靈壽杖靈壽一枝瘦同鶴脛肌輕體赤幽人稱住行坐卧不相離穿雲過水常隨定豁散迷津指回斜徑扶危助險通神聖依時攪撥虎龍爭尖挑日月乾坤瑩南柯子體若虛空淨心如泰華安萬緣妄想不相干正住無思觸處得安間覺海神珠瑩禪天性月寒圓明不昧顯𤳗𤳗放去收來一點地天寬其二與背道者久靜還思動情甘愛海迷仙凡兩路似雲泥從此相分不顧上天梯莫學鶴鷯志營營戀小枝北溟鯤量願君為咫尺成鵬准擬奮天池其三張道一問黃芽陽動陰隨變黃芽漸長成參差五葉發黃庭珠蘂苞開放出紫金英始結神丹粒清光宇泰生從容透體縷霞明內外輝輝法界混惺惺其四坐卧常澄湛連綿緩吸呼溫溫九氣聚鉛罏滚泛身田晝夜飲瓊酥腹內三丹有心頭一物無養成健體契空虛出沒惺惺實相現元初金盞兒放心間樂林泉山檀瓦鼎龍涎暖寒樽興冷茶煙情湛湛腹便便陪遊鹿伴啼猿淨靈源火生蓮清凉照見諸塵遣明五眼證重玄珠瑩海月沉淵圓明相應無邊解佩令歎燈蛾燈蛾種性迷沉苦境只貪尋燭中花影抵死身投被爛炙猶然不明全錯認流螢艷冷向明有意因懷暗景奈無功忍死俄頃識破炎光不自炙亡形亡命落清凉境中獨興其二心清養浩星塵無擾近林泉輪蹄不到活計蕭間任盈門苔蘚圍繞有滿院落花風掃鶴鳴露冷猿啼月皎日相陪松花瑶草受用無為也不曾身外尋討悟衣珠目前蓬島浪淘沙休執相皆室徒滯頑室勞勞不見有中空空裏混成神妙體室乃不空此理是真空物物明空念無念念不爭空照見緣空成深智方了圓空萬年春靜聽身中火龍水虎爭吟嘯真奇妙風浪聲繁盤繞天光罩鍊結金霜壺鼎推真造成寶耀地輝天淨體無塵擾其二活計安間日日風月為真宰心無掛靜聽猿啼似訴無生話一味清凉眼底無纖芥光明大內外輝輝如託虛空界其三中秋秋夜銀蟾一天萬里光如洗清風細拂拭乾坤冰瑩無纖翳星斗光沉全露圓明體白麾底晃我神遊親詣攀青桂武陵春警執法人自因言能悟理得理要忘言既得魚時莫執筌筌執謾著鞭閉口藏舌不作解默默究重玄專氣修心息妄緣月冷照青天其二王小先問禪法界一真心正住當體滅諸緣內外輝輝體現前無地亦無天取相於禪禪復遠禪性月沉淵動靜俱無鎮湛然神用即真禪南鄉子七返降真陰主换為賓力不禁神妙峥嶸三界外俄臨徹地通天耀古今當體慮沉沉鶴馭清風一片心自北自南無罣礙時歆真樂真歡恣嘯吟望蓬萊修真客守弱志須剛金鼎滿添留命藥玉爐頻爇洞真香心境總清凉通玄妙獨據法中王諸魅群魔俱燼滅三陽九氣用兵强觸處露堂堂又涉塵客念念苦貪叨掛壁飛猱心縱樂戰風劣馬意徒勞熟境恣煎熬甘執苦心事冗如毛爭似劈摧情擾擾且甜耕道樂陶陶生死路能逃採桑子虛無妙道心堅守虛自投來氤氲成胎靈質無中日月栽時時自飲崑山酒醉卧丹臺令攝三臺萬劫迷雲一豁開西江月一點陽生坎殿兩絃風陳衝天三關頂化液漙漙四象真砂始變五彩霞生鼎燦六神和暢綿綿七星司用總安然八面玲瓏體現减字木蘭花蠻觸非是識破心顏如棄屣痼疾雲山猿鶴相陪盡日間一壺風月清淨光明相照徹內外俱空無執空心觸處通其二忘機索妙萬法皆空心上了無徼無邊一片清光萬里天明明淨體不放星塵蠅點翳內外圓融正住空空法界中長思仙鼎乾坤鍊雌雄陰變純陽空像同縱橫妙體融風乘我我乘風風我相乘法界中無形空不室如夢令萬法心頭可可偃月抽添水火淘鍊結金晶迸出圓明珠顆證果證果一混虛空是我啓真集卷中
